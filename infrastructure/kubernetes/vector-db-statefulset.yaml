apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: eaioc-weaviate
  namespace: eaioc-production
  labels:
    app: weaviate
    component: vector-db
spec:
  serviceName: eaioc-weaviate-headless
  replicas: 1
  selector:
    matchLabels:
      app: weaviate
  template:
    metadata:
      labels:
        app: weaviate
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2112"
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: weaviate
          image: semitechnologies/weaviate:1.23.0
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 2112
              name: metrics
          env:
            - name: QUERY_DEFAULTS_LIMIT
              value: "25"
            - name: AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED
              value: "false"
            - name: AUTHENTICATION_APIKEY_ENABLED
              value: "true"
            - name: AUTHENTICATION_APIKEY_ALLOWED_KEYS
              valueFrom:
                secretKeyRef:
                  name: eaioc-secrets
                  key: weaviate_api_key
            - name: AUTHORIZATION_ADMINLIST_ENABLED
              value: "true"
            - name: PERSISTENCE_DATA_PATH
              value: "/var/lib/weaviate"
            - name: DEFAULT_VECTORIZER_MODULE
              value: "none"
            - name: ENABLE_MODULES
              value: "text2vec-openai,generative-openai"
            - name: OPENAI_APIKEY
              valueFrom:
                secretKeyRef:
                  name: eaioc-secrets
                  key: openai_api_key
                  optional: true
            - name: CLUSTER_HOSTNAME
              value: "eaioc-weaviate"
          resources:
            requests:
              cpu: "1000m"
              memory: "4Gi"
            limits:
              cpu: "2000m"
              memory: "8Gi"
          volumeMounts:
            - name: weaviate-data
              mountPath: /var/lib/weaviate
          livenessProbe:
            httpGet:
              path: /v1/.well-known/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /v1/.well-known/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: weaviate-data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: eaioc-weaviate-headless
  namespace: eaioc-production
  labels:
    app: weaviate
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: weaviate
  ports:
    - port: 8080
      name: http
    - port: 2112
      name: metrics

---
apiVersion: v1
kind: Service
metadata:
  name: eaioc-weaviate-svc
  namespace: eaioc-production
  labels:
    app: weaviate
spec:
  type: ClusterIP
  selector:
    app: weaviate
  ports:
    - port: 8080
      targetPort: 8080
      name: http
