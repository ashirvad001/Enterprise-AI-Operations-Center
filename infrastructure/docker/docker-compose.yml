version: '3.8'

services:
  # ---------------------------------------------------------
  # PostgreSQL with pgvector (Primary Database)
  # ---------------------------------------------------------
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: eaioc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eaioc_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eaioc_secret_pass_local}
      POSTGRES_DB: ${POSTGRES_DB:-eaioc_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eaioc_admin} -d ${POSTGRES_DB:-eaioc_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # Redis (Cache, Sessions, Pub/Sub Streams)
  # ---------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: eaioc_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-eaioc_redis_local} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-eaioc_redis_local}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # MinIO (S3-compatible Object Storage)
  # ---------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z
    container_name: eaioc_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-eaioc_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-eaioc_minio_secret}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API API
      - "9001:9001" # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # MinIO Setup (Creates buckets automatically)
  # ---------------------------------------------------------
  minio-setup:
    image: minio/mc:RELEASE.2023-11-20T16-30-59Z
    container_name: eaioc_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 ${MINIO_ROOT_USER:-eaioc_minio_admin} ${MINIO_ROOT_PASSWORD:-eaioc_minio_secret};
      /usr/bin/mc mb myminio/eaioc-rag-docs --ignore-existing;
      /usr/bin/mc mb myminio/eaioc-multimodal-assets --ignore-existing;
      /usr/bin/mc mb myminio/eaioc-voice-recordings --ignore-existing;
      /usr/bin/mc mb myminio/eaioc-edge-models --ignore-existing;
      /usr/bin/mc policy set public myminio/eaioc-multimodal-assets;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
